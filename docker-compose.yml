version: "3"

services:
  postgres:
    image: postgres:12-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.22.0
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --name nakama1
        --database.address postgres:localdb@postgres:5432/nakama
        --logger.level DEBUG
        --socket.max_message_size_bytes 4096
        --runtime.js_entrypoint build/match.js
    ports:
      - "7350:7350"
      - "7351:7351"
      - "7349:7349"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nakama/build:/nakama/data/modules/build
    environment:
      - NAKAMA_CONSOLE_USERNAME=admin
      - NAKAMA_CONSOLE_PASSWORD=admin123

volumes:
  pgdata:
